services:
  database-mongo:
    image: mongo:latest
    container_name: pokedex-mongo
    volumes:
      - ./mongo:/data/db
    ports:
      - "27017:27017" 

  node:
    container_name: pokedex-node
    image: node:24.11.1
    working_dir: /var/www
    volumes:
      - ./api:/var/www
    ports:
      - "8000:8000" 
    command: sh -c "npm install && npm run dev"